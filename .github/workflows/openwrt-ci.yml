name: OpenWrt-CI

on:
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'OpenWrt仓库'
        required: true
        default: 'openwrt/openwrt'
        type: choice
        options:
          - 'openwrt/openwrt'
      REPO_BRANCH:
        description: 'OpenWrt分支'
        required: true
        default: 'main'
        type: choice
        options:
          - 'main'
          - 'openwrt-25.12'
          - 'v25.12.4'
      CCACHE:
        description: 'Enable ccache (Use Cache to speed up next build)'
        type: boolean
        default: true

env:
  REPO_URL: "https://github.com/${{ github.event.inputs.REPO_URL }}.git"
  REPO_BRANCH: ${{ github.event.inputs.REPO_BRANCH }}
  SOURCE_PATH: "${{ github.workspace }}/openwrt-source"
  TZ: Asia/Shanghai
  BUILDER_PATH: ${{ github.workspace }}

# contents:write 用于 ncipollo/release-action 发布固件；actions:write 用于清理旧缓存
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{matrix.DEVICE}}
    strategy:
      fail-fast: false
      matrix:
        DEVICE: ["nanopi-r5s", "cudy-tr3000", "x86_64"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Space cleanup
        uses: dd-ray/github-actions@free-disk
        with:
          build-mount-path: "${{ env.SOURCE_PATH }}"
      - name: Build System Setup
        uses: dd-ray/github-actions@openwrt-build-setup
      - name: Install LLVM
        uses: dd-ray/github-actions@install-llvm
      - name: Clone OpenWrt
        run: |
          ./script/tool.sh clone
      # 归一化出两位版本标记，用于隔离不同 OpenWrt 版本的缓存：
      # main -> main；openwrt-25.12 / v25.12.4 -> 25.12（去掉前缀和第三位补丁号）
      - name: Resolve OpenWrt version tag
        run: |
          ver="${REPO_BRANCH#openwrt-}"
          ver="${ver#v}"
          if [ "$ver" != "main" ]; then
            ver="$(echo "$ver" | cut -d. -f1,2)"
          fi
          echo "OPENWRT_VERSION=$ver" >> "$GITHUB_ENV"
          echo "Resolved OpenWrt version tag: $ver"
      - name: Cache
        uses: stupidloud/cachewrtbuild@main
        with:
          prefix: ${{ env.SOURCE_PATH }}
          #是否一并缓存.ccache目录，如果你启用了ccache。这是唯一的常用参数，其他三个用于除错，一般不需要调整
          ccache: ${{ github.event.inputs.CCACHE }}
          #是否缓存工具链目录
          toolchain: true
          #是否跳过工具链编译
          skip: true
          #清空缓存
          clean: false
          # 加入版本标记，让不同 OpenWrt 版本各自独立缓存，互不覆盖
          mixkey: ${{ matrix.DEVICE }}-${{ env.OPENWRT_VERSION }}

      # cachewrtbuild 在启用 ccache 时会在 key 末尾追加时间戳，导致每次构建都新存一份
      # ~1.1GB 缓存，3 个设备累积很快撑爆 10GB 仓库缓存上限并触发 LRU 淘汰。
      # 这里在“恢复之后、保存之前”按 (设备 + 版本) 只保留最新一份，其余（含旧
      # toolchain hash 的失效缓存）全部删除，腾出空间且避免误淘汰其它版本的缓存。
      - name: Prune stale caches for this device
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PREFIX: ${{ matrix.DEVICE }}-${{ env.OPENWRT_VERSION }}-cache-openwrt-
          REF: ${{ github.ref }}
        run: |
          echo "Pruning caches with prefix '${PREFIX}' on ref ${REF}, keeping the most recent one"
          ids=$(gh cache list --ref "$REF" --limit 100 --json key,id,createdAt \
            --jq "[.[] | select(.key | startswith(\"${PREFIX}\"))] | sort_by(.createdAt) | reverse | .[1:] | .[].id")
          if [ -z "$ids" ]; then
            echo "No stale caches to delete."
          else
            for id in $ids; do
              echo "Deleting stale cache id=$id"
              gh cache delete "$id" || true
            done
          fi

      - name: Update feeds
        run: ./script/tool.sh update_feeds
      - name: Generate configuration file
        env:
          CONFIG_FILE: ${{ matrix.DEVICE }}.seed
        run: ./script/tool.sh build_config
      - name: Make download
        run: ./script/tool.sh make_download
      - name: Compile firmware
        run: ./script/tool.sh compile_firmware
      - name: Prepare firmware
        run: |
          rm -rf ${{env.SOURCE_PATH}}/bin/targets/*/*/packages
          mkdir -p ${{env.SOURCE_PATH}}/bin/output/
          cp -f ${{env.SOURCE_PATH}}/bin/targets/*/*/* ${{env.SOURCE_PATH}}/bin/output/
      - name: Set release Variable
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          if [ "${{ env.REPO_BRANCH }}" == "main" ]; then
            echo "RELEASE_BRANCH=Snapshot" >> $GITHUB_ENV
          else
            echo "RELEASE_BRANCH=${{ env.REPO_BRANCH }}" | sed 's/openwrt-//' >> $GITHUB_ENV
          fi
      - name: Create release
        uses: ncipollo/release-action@v1.18.0
        with:
          name: OpenWrt-${{ env.RELEASE_BRANCH }}-${{ matrix.DEVICE }}
          allowUpdates: true
          tag: ${{ env.REPO_BRANCH }}-${{ matrix.DEVICE }}
          commit: main
          replacesArtifacts: true
          artifacts: ${{env.SOURCE_PATH}}/bin/output/*
          body: |
            ## 🎯 设备信息
            - **设备型号**: ${{ matrix.DEVICE }}
            - **OpenWrt 分支**: ${{ env.REPO_BRANCH }}
            - **构建时间**: ${{ env.BUILD_TIME }}
            - **构建编号**: #${{ github.run_number }}        

      - name: Upload OpenWrt firmware
        uses: actions/upload-artifact@master
        with:
          name: OpenWrt firmware ${{ matrix.DEVICE }}
          path: |
            ${{env.SOURCE_PATH}}/bin/targets/
